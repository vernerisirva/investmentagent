name: Daily public watchlist

on:
  schedule:
    # Poll through the Helsinki morning because GitHub scheduled runs can drift.
    - cron: "7,17,27,37,47,57 4-7 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-public-watchlist
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      REPORT_ROOT: docs/reports
      RUN_DAILY_REPORT: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: Decide scheduled run
        if: github.event_name == 'schedule'
        run: |
          helsinki_hour="$(TZ=Europe/Helsinki date +%H)"
          report_date="$(TZ=Europe/Helsinki date +%F)"

          if [ "$helsinki_hour" -lt 8 ]; then
            echo "RUN_DAILY_REPORT=false" >> "$GITHUB_ENV"
            echo "Skipping because current Helsinki hour is $helsinki_hour, before 08."
            exit 0
          fi

          if [ -f "$REPORT_ROOT/trading/${report_date}.md" ]; then
            echo "RUN_DAILY_REPORT=false" >> "$GITHUB_ENV"
            echo "Skipping because ${report_date} report already exists."
          fi

      - name: Set up Python
        if: env.RUN_DAILY_REPORT == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install InvestmentAgent
        if: env.RUN_DAILY_REPORT == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Skip closed Nordic market days
        if: github.event_name == 'schedule' && env.RUN_DAILY_REPORT == 'true'
        run: |
          report_date="$(TZ=Europe/Helsinki date +%F)"
          if ! investmentagent markets open \
            --date "$report_date" \
            --market stockholm \
            --market helsinki; then
            echo "RUN_DAILY_REPORT=false" >> "$GITHUB_ENV"
            echo "Skipping because Stockholm and Helsinki are not both open on ${report_date}."
          fi

      - name: Generate public watchlist report
        if: env.RUN_DAILY_REPORT == 'true'
        env:
          FINIMPULSE_API_KEY: ${{ secrets.FINIMPULSE_API_KEY }}
        run: |
          if [ -z "$FINIMPULSE_API_KEY" ]; then
            echo "::error::FINIMPULSE_API_KEY repository secret is missing."
            exit 1
          fi

          report_date="$(TZ=Europe/Helsinki date +%F)"
          generated_at="$(TZ=Europe/Helsinki date '+%Y-%m-%d %H:%M %Z')"

          generate_report() {
            report_name="$1"
            strategy="$2"
            report_dir="$REPORT_ROOT/$report_name"
            report_path="$report_dir/${report_date}.md"
            json_path="$RUNNER_TEMP/${report_name}-${report_date}.json"

            mkdir -p "$report_dir"
            investmentagent watchlist \
              --provider live \
              --fundamentals finimpulse \
              --country se,fi \
              --limit 10 \
              --min-country FI:3 \
              --strategy "$strategy" \
              --verbose \
              --save "$report_path" \
              --save "$json_path" \
              > "$RUNNER_TEMP/${report_name}-watchlist-output.txt"

            cp "$report_path" "$report_dir/latest.md"
          }

          generate_report "trading" "trading"
          generate_report "long-term" "long-term"

          mkdir -p docs/performance docs/data/performance
          investmentagent performance update \
            --report-json "$RUNNER_TEMP/trading-${report_date}.json" \
            --report-json "$RUNNER_TEMP/long-term-${report_date}.json" \
            --report-date "$report_date" \
            --ledger docs/data/performance/ledger.json \
            --output docs/performance/index.md \
            --latest docs/performance/latest.md \
            --price-provider live \
            --generated-at "$generated_at"

          {
            echo "# InvestmentAgent Daily Ideas"
            echo
            echo "Generated: ${generated_at}"
            echo
            echo "## Today's Reports"
            echo
            echo "- [Top 10 Trading Ideas](reports/trading/latest.html)"
            echo "- [Top 10 Long-Term Investment Ideas](reports/long-term/latest.html)"
            echo "- [Performance Scorecard](performance/index.html)"
            echo
            echo "## Dated Reports"
            echo
            echo "- [Trading Ideas ${report_date}](reports/trading/${report_date}.html)"
            echo "- [Long-Term Investment Ideas ${report_date}](reports/long-term/${report_date}.html)"
            echo
            echo "Reports are research triage only. Not financial advice."
          } > docs/index.md

      - name: Commit public report
        if: env.RUN_DAILY_REPORT == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.md "$REPORT_ROOT" docs/performance docs/data/performance
          if git diff --cached --quiet; then
            echo "No report changes to commit."
            exit 0
          fi
          report_date="$(TZ=Europe/Helsinki date +%F)"
          git commit -m "reports: publish daily watchlist ${report_date}"
          git push origin HEAD:main
